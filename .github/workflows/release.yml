name: Release

on:
  push:
    branches:
      - main

# Default-deny: the workflow itself gets no write scopes.
# Only the publish job below is granted the tokens it needs.
permissions:
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Never run in a fork or under another owner.
    if: github.repository_owner == 'jagreehal'
    # Pairs with the npm trusted-publisher "Environment name = release" setting.
    # GitHub only grants this environment to jobs that satisfy the environment's
    # rules (deployment branch restricted to main + required reviewer), so a
    # workflow running from any other branch cannot obtain the OIDC claim npm
    # requires, and the publish is rejected. Releases can only originate from
    # the protected release path.
    environment: release
    permissions:
      contents: write       # changesets: version commit, tags, GitHub release
      pull-requests: write  # changesets: open the "Version Packages" PR
      id-token: write       # OIDC trusted publishing / provenance — scoped to THIS job only
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC trusted publishing
        run: npx npm@11 install -g npm@11

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Cache pnpm dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
