name = "cloudflare-example"
main = "src/worker.ts"
# Cloudflare native tracing + custom spans (ctx.tracing) require a recent compatibility_date.
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# Cloudflare native tracing (beta). When enabled, autotel auto-detects it and
# defers to the platform: trace()/span() calls nest in the native waterfall and
# Cloudflare exports them. Traces are viewable in the Cloudflare dashboard, and
# (optionally) exported to any OTLP backend via a `destinations` entry.
# Comment this block out to use autotel's own OTLP exporter instead.
[observability.traces]
enabled = true
# head_sampling_rate = 0.1               # sample 10% of requests (default 1 = 100%)
# destinations = ["my-otlp-traces"]      # name of a destination you create in the
#   Cloudflare dashboard (Workers Observability → Add destination), pointing at
#   any OTLP traces endpoint. Exports the native waterfall incl. autotel spans.

# Logs pipeline (separate from traces). Captures console.* output (incl.
# autotel's structured logger) into Workers Logs. Under native tracing each log
# line is auto-attributed to the active span. Add a logs `destinations` entry to
# export them to any OTLP logs endpoint too.
[observability.logs]
enabled = true
# head_sampling_rate = 1.0
# destinations = ["my-otlp-logs"]

[vars]
# Used only when native tracing is OFF (local dev / nativeTracing:'off') — point
# at autotel-devtools or any OTLP collector.
OTLP_ENDPOINT = "http://localhost:4318/v1/traces"
# NATIVE_TRACING = "off"   # force the autotel OTLP exporter (e.g. for devtools)
# ENVIRONMENT = "production"
# DISABLE_INSTRUMENTATION = "true"

# KV Namespace — uncomment to enable KV demo endpoints
# [[kv_namespaces]]
# binding = "MY_KV"
# id = "your-kv-namespace-id"

# R2 Bucket — uncomment to enable R2 demo endpoints
# [[r2_buckets]]
# binding = "MY_R2"
# bucket_name = "my-bucket"

# D1 Database — uncomment to enable D1 demo endpoints
# [[d1_databases]]
# binding = "MY_D1"
# database_name = "my-database"
# database_id = "00000000-0000-0000-0000-000000000000"

# Workers AI — uncomment to enable AI demo endpoints
# [ai]
# binding = "AI"

# Vectorize — uncomment to enable vector search demo
# [[vectorize]]
# binding = "VECTORIZE"
# index_name = "my-index"

# Queue Producer — uncomment to enable queue demo
# [[queues.producers]]
# binding = "MY_QUEUE"
# queue = "my-queue"

# Analytics Engine — uncomment to enable analytics demo
# [[analytics_engine_datasets]]
# binding = "AE"

# Service Binding — uncomment to route to another worker
# [[services]]
# binding = "MY_SERVICE"
# service = "my-other-worker"
# environment = "production"

# Scheduled trigger (cron)
# [[triggers.crons]]
# cron = "*/5 * * * *"

# Queue Consumer
# [[queues.consumers]]
# queue = "my-queue"
# max_batch_size = 10
# max_batch_timeout = 30
